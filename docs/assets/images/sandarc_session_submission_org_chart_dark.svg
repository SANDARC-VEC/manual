<svg width="100%" viewBox="0 0 680 810" role="img" font-family="&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif" xmlns="http://www.w3.org/2000/svg">
  <title>SANDARC session submission process org chart</title>
  <desc>Org chart showing the flow from exam session team lead through the SANDARC VEC team to FCC submission, license issuance, and notifications to the team lead, VEC, and applicant.</desc>
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#4a5568" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect width="680" height="810" fill="#0f1117"/>

  <!-- Session team lead -->
  <rect x="190" y="30" width="300" height="56" rx="8" fill="#0c2a1e" stroke="#1d6b4a"/>
  <text font-size="14" font-weight="500" fill="#5dcaa5" x="340" y="52" text-anchor="middle" dominant-baseline="central">Session team lead</text>
  <text font-size="12" fill="#2d8a62" x="340" y="70" text-anchor="middle" dominant-baseline="central">Compiles session file after exam</text>

  <line x1="340" y1="86" x2="340" y2="136" stroke="#4a5568" stroke-width="1.2" marker-end="url(#arr)"/>
  <text font-size="12" fill="#8a94a6" x="356" y="103" dominant-baseline="central">Emails "VEC Archive" file</text>
  <text font-size="12" fill="#8a94a6" x="356" y="120" dominant-baseline="central">to vec@sandarc.org</text>

  <!-- VEC Email Inbox -->
  <rect x="140" y="136" width="400" height="44" rx="8" fill="#1a1632" stroke="#3d3482"/>
  <text font-size="14" font-weight="500" fill="#9f97e8" x="340" y="158" text-anchor="middle" dominant-baseline="central">SANDARC VEC — Email Inbox</text>

  <line x1="340" y1="180" x2="340" y2="216" stroke="#4a5568" stroke-width="1.2" marker-end="url(#arr)"/>
  <text font-size="12" fill="#8a94a6" x="356" y="202" dominant-baseline="central">Verifies Session Authenticity</text>

  <!-- VEC team container -->
  <rect x="50" y="216" width="580" height="196" rx="12" fill="none" stroke="#252830"/>
  <text font-size="12" fill="#8a94a6" x="66" y="234" dominant-baseline="central">SANDARC VEC team</text>

  <!-- Austin W4PBL -->
  <rect x="66" y="244" width="172" height="70" rx="8" fill="#1a1632" stroke="#3d3482"/>
  <text font-size="14" font-weight="500" fill="#9f97e8" x="152" y="261" text-anchor="middle" dominant-baseline="central">Austin W4PBL</text>
  <text font-size="12" fill="#6660b0" x="152" y="279" text-anchor="middle" dominant-baseline="central">FCC application processor</text>
  <text font-size="12" fill="#6660b0" x="152" y="297" text-anchor="middle" dominant-baseline="central">Primary</text>

  <!-- Sepehr N6IRN -->
  <rect x="254" y="244" width="172" height="70" rx="8" fill="#1a1632" stroke="#3d3482"/>
  <text font-size="14" font-weight="500" fill="#9f97e8" x="340" y="261" text-anchor="middle" dominant-baseline="central">Sepehr N6IRN</text>
  <text font-size="12" fill="#6660b0" x="340" y="279" text-anchor="middle" dominant-baseline="central">FCC application processor</text>
  <text font-size="12" fill="#6660b0" x="340" y="297" text-anchor="middle" dominant-baseline="central">Secondary</text>

  <!-- Greg N6NYX -->
  <rect x="442" y="244" width="172" height="70" rx="8" fill="#1a1632" stroke="#3d3482"/>
  <text font-size="14" font-weight="500" fill="#9f97e8" x="528" y="261" text-anchor="middle" dominant-baseline="central">Greg N6NYX</text>
  <text font-size="12" fill="#6660b0" x="528" y="279" text-anchor="middle" dominant-baseline="central">FCC application processor</text>
  <text font-size="12" fill="#6660b0" x="528" y="297" text-anchor="middle" dominant-baseline="central">Tertiary</text>

  <line x1="152" y1="314" x2="152" y2="382" stroke="#4a5568" stroke-width="0.5"/>
  <line x1="340" y1="314" x2="340" y2="382" stroke="#4a5568" stroke-width="0.5"/>
  <line x1="528" y1="314" x2="528" y2="382" stroke="#4a5568" stroke-width="0.5"/>
  <line x1="152" y1="382" x2="528" y2="382" stroke="#4a5568" stroke-width="0.5"/>
  <line x1="340" y1="382" x2="340" y2="402" stroke="#4a5568" stroke-width="1.2" marker-end="url(#arr)"/>
  <text font-size="12" fill="#8a94a6" x="356" y="396" dominant-baseline="central">Submits Applications</text>

  <!-- FCC -->
  <rect x="215" y="414" width="250" height="44" rx="8" fill="#1c1c1e" stroke="#3a3a3c"/>
  <text font-size="14" font-weight="500" fill="#a8a8a0" x="340" y="436" text-anchor="middle" dominant-baseline="central">FCC</text>

  <line x1="340" y1="458" x2="340" y2="494" stroke="#4a5568" stroke-width="1.2" marker-end="url(#arr)"/>

  <!-- Applicant Pays Fee / Felony Question Hold -->
  <rect x="90" y="494" width="500" height="44" rx="8" fill="#241a08" stroke="#6b3d08"/>
  <text font-size="14" font-weight="500" fill="#c98a3a" x="340" y="516" text-anchor="middle" dominant-baseline="central">Applicant Pays Fee / Felony Question Hold</text>

  <line x1="340" y1="538" x2="340" y2="574" stroke="#4a5568" stroke-width="1.2" marker-end="url(#arr)"/>

  <!-- License issued -->
  <rect x="190" y="574" width="300" height="56" rx="8" fill="#0c1f0c" stroke="#1f5e1f"/>
  <text font-size="14" font-weight="500" fill="#5daa5d" x="340" y="594" text-anchor="middle" dominant-baseline="central">License issued</text>
  <text font-size="12" fill="#2d7a2d" x="340" y="612" text-anchor="middle" dominant-baseline="central">FCC grants license to applicant</text>

  <line x1="340" y1="630" x2="340" y2="666" stroke="#4a5568" stroke-width="1.2" marker-end="url(#arr)"/>
  <text font-size="12" fill="#8a94a6" x="356" y="652" dominant-baseline="central">Notifies All Parties Involved</text>

  <!-- Notifications container -->
  <rect x="50" y="666" width="580" height="100" rx="12" fill="none" stroke="#252830"/>
  <text font-size="12" fill="#8a94a6" x="66" y="684" dominant-baseline="central">Notifications sent</text>

  <!-- Team lead -->
  <rect x="66" y="694" width="162" height="56" rx="8" fill="#0c2a1e" stroke="#1d6b4a"/>
  <text font-size="14" font-weight="500" fill="#5dcaa5" x="147" y="714" text-anchor="middle" dominant-baseline="central">Team lead</text>
  <text font-size="12" fill="#2d8a62" x="147" y="732" text-anchor="middle" dominant-baseline="central">License grant confirmed</text>

  <!-- VEC -->
  <rect x="249" y="694" width="162" height="56" rx="8" fill="#1a1632" stroke="#3d3482"/>
  <text font-size="14" font-weight="500" fill="#9f97e8" x="330" y="714" text-anchor="middle" dominant-baseline="central">VEC</text>
  <text font-size="12" fill="#6660b0" x="330" y="732" text-anchor="middle" dominant-baseline="central">License grant confirmed</text>

  <!-- Applicant -->
  <rect x="432" y="694" width="162" height="56" rx="8" fill="#0c1f0c" stroke="#1f5e1f"/>
  <text font-size="14" font-weight="500" fill="#5daa5d" x="513" y="714" text-anchor="middle" dominant-baseline="central">Applicant</text>
  <text font-size="12" fill="#2d7a2d" x="513" y="732" text-anchor="middle" dominant-baseline="central">License grant confirmed</text>
</svg>
