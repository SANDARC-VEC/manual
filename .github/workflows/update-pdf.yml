name: Update PDF manual

# Rebuild SANDARC-VEC-Manual.pdf whenever manual content changes on main
# and upload it to the rolling "pdf" GitHub release. The site's Download
# PDF buttons (extra.pdf_url in mkdocs.yml) link straight to that release
# asset, so the PDF is never committed to the repo and the site needs no
# redeploy to pick it up.

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "overrides/**"
      - "hooks/**"
      - "mkdocs.yml"
      - "scripts/build-pdf.py"
      - "requirements.txt"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-pdf
  cancel-in-progress: true

jobs:
  build-pdf:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so the git-changelog hook sees real page history.
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium --only-shell --with-deps

      - name: Build PDF
        run: python scripts/build-pdf.py

      - name: Upload to the rolling "pdf" release
        run: |
          gh release view pdf >/dev/null 2>&1 || gh release create pdf \
            --title "SANDARC VEC Manual (PDF)" \
            --notes "Always the latest PDF build of the manual, regenerated automatically whenever the manual changes."
          gh release upload pdf SANDARC-VEC-Manual.pdf --clobber
