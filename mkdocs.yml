site_name: SANDARC VEC Manual
site_url: https://vec.sandarc.org/manual/

theme:
  name: material
  custom_dir: overrides
  font: false
  palette:

    - scheme: sandarc-light
      toggle:
        icon: material/weather-night
        name: Switch to dark mode

    - scheme: sandarc-dark
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.path
    - navigation.footer
    - navigation.instant
    - navigation.instant.prefetch

extra:
  social:
    - icon: fontawesome/brands/discord
      link: https://discord.sandarc.org

copyright: Copyright &copy; 2026 San Diego County Amateur Radio Council

extra_css:
  - stylesheets/extra.css

nav:
  - Home: index.md
  - Intro:
    - Being A Cool VE: Intro/Being_A_Cool_VE.md
    - Key Contacts: Intro/Key_Contacts.md
    - Other VECs: Intro/Other_VECs.md
  - Prepare For A Session:
    - Preparing for the Session: Prepare For A Session/Preparing_for_the_Session.md
    - Session Day Checklist: Prepare For A Session/Session_Day_Checklist.md
    - Exam Materials: Prepare For A Session/Exam_Materials.md
    - Registering Applicants: Prepare For A Session/registering-applicants.md
  - Conduct A Session:
    - Conducting the Session: Conduct A Session/Conducting_the_Session.md
    - Remote Testing: Conduct A Session/Remote Testing/Remote_Testing.md
    - Fees and Reimbursement: Conduct A Session/Fees_and_Reimbursement.md
    - CSCE Overview: Conduct A Session/CSCE_Overview.md
    - Felony Question: Conduct A Session/Felony_Question.md
  - Post Session Information:
    - After the Session: Post Session Information/After_the_Session.md
  - Start A Team:
    - Accrediting a VE: Start A Team/Accrediting_a_VE.md
    - Start a New Team: Start A Team/Start-A-New-Team.md

markdown_extensions:
  - md_in_html
  - attr_list
  - pymdownx.superfences
  - pymdownx.tasklist:
      custom_checkbox: true
      clickable_checkbox: true