site_name: SANDARC VEC Manual
site_url: https://vec.sandarc.org/manual/

theme:
  name: material
  custom_dir: overrides
  favicon: https://assets.sandarc.org/logo/current-logo.png
  font: false
  palette:

    - scheme: sandarc-light
      toggle:
        icon: material/weather-night
        name: Switch to dark mode

    - scheme: sandarc-dark
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.path
    - navigation.footer
    - navigation.instant
    - navigation.instant.prefetch
    - toc.follow

extra:
  social:
    - icon: fontawesome/brands/discord
      link: https://discord.sandarc.org

copyright: Copyright &copy; 2026 San Diego County Amateur Radio Council

extra_css:
  - stylesheets/extra.css
  - stylesheets/print-site.css

plugins:
  - search
  # print-site must stay the LAST plugin: it collects the final rendered
  # HTML of every page to assemble the single print page.
  - print-site:
      add_to_navigation: false
      print_page_title: "SANDARC VEC Manual"
      add_table_of_contents: true
      toc_title: "Contents"
      toc_depth: 2
      # Enumeration counts the excluded Home page, so visible numbering
      # would start at "2" — keep headings unnumbered instead.
      enumerate_headings: false
      enumerate_figures: false
      add_cover_page: true
      cover_page_template: "docs/assets/templates/cover-page.tpl"
      exclude:
        # The hero landing page is web-only chrome; the PDF gets a
        # branded cover page instead.
        - index.md

hooks:
  - hooks/reading_time.py
  - hooks/git_changelog.py
  - hooks/copy_pdf.py

nav:
  - Home: index.md
  - Intro:
    - Being A Cool VE: Intro/Being-A-Cool-VE.md
    - Key Contacts: Intro/Key-Contacts.md
    - Other VECs: Intro/Other-VECs.md
  - Prepare For A Session:
    - Preparing for the Session: Prepare For A Session/Preparing-for-the-Session.md
    - Session Day Checklist: Prepare For A Session/Session-Day-Checklist.md
    - Exam Materials: Prepare For A Session/Exam-Materials.md
    - Registering Applicants: Prepare For A Session/registering-applicants.md
  - Conduct A Session:
    - Conducting the Session: Conduct A Session/Conducting-the-Session.md
    - Remote Testing: Conduct A Session/Remote Testing/Remote-Testing.md
    - Fees and Reimbursement: Conduct A Session/Fees-and-Reimbursement.md
    - CSCE Overview: Conduct A Session/CSCE-Overview.md
    - Felony Question: Conduct A Session/Felony-Question.md
  - Post Session Information:
    - After the Session: Post Session Information/After-the-Session.md
  - Start A Team:
    - Accrediting a VE: Start A Team/Accrediting-a-VE.md
    - Start a New Team: Start A Team/Start-A-New-Team.md

markdown_extensions:
  - md_in_html
  - attr_list
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tasklist:
      custom_checkbox: true
      clickable_checkbox: true
